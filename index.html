<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Studio - Anti Gagal</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .dark { background-color: #0f172a; color: #f8fafc; }
        .loading-animation { animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-500">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            // --- MASUKKAN API KEY ANDA DI SINI ---
            const GEMINI_API_KEY = "AIzaSyAvxBXs78h5vDt2gJwYXj2WrTcKvZx7LqE";

            const [darkMode, setDarkMode] = useState(false);
            const [activeTab, setActiveTab] = useState('product');
            const [images, setImages] = useState([]);
            const [prompt, setPrompt] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [resultImage, setResultImage] = useState(null);
            const [error, setError] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            const processFile = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = 512; canvas.height = 512;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, 512, 512);
                            resolve(canvas.toDataURL('image/jpeg', 0.8));
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                try {
                    let newImgs = [];
                    for (const f of files) {
                        const b64 = await processFile(f);
                        newImgs.push({ id: Math.random(), data: b64 });
                    }
                    if (activeTab === 'product') setImages([newImgs[0]]);
                    else setImages(prev => [...prev, ...newImgs].slice(0, 4));
                } catch (err) { setError("Gagal unggah foto."); }
            };

            const handleGenerate = async () => {
                if (!images.length || !prompt) return setError("Pilih foto & isi instruksi!");
                setIsGenerating(true); setError('');
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-image-preview:generateContent?key=${GEMINI_API_KEY}`;
                    const payload = {
                        contents: [{
                            parts: [
                                { text: prompt },
                                ...images.map(img => ({
                                    inlineData: { mimeType: "image/jpeg", data: img.data.split(',')[1] }
                                }))
                            ]
                        }],
                        generationConfig: { responseModalities: ["IMAGE"] }
                    };
                    const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    const output = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    if (output) setResultImage(`data:image/jpeg;base64,${output}`);
                    else setError("AI tidak merespons. Coba lagi.");
                } catch (err) { setError("Error: " + err.message); }
                finally { setIsGenerating(false); }
            };

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-10 font-sans">
                    <header className="flex justify-between items-center mb-8 p-6 bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800">
                        <div className="flex items-center gap-2">
                            <span className="text-3xl">✨</span>
                            <h1 className="text-2xl font-black dark:text-white">AI STUDIO</h1>
                        </div>
                        <button onClick={() => setDarkMode(!darkMode)} className="text-2xl p-2 bg-slate-100 dark:bg-slate-800 rounded-2xl">
                            {darkMode ? "☀️" : "🌙"}
                        </button>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="space-y-6">
                            <div className="flex bg-slate-200 dark:bg-slate-800 p-1.5 rounded-2xl">
                                <button onClick={() => setActiveTab('product')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${activeTab==='product'?'bg-blue-600 text-white shadow-lg':'dark:text-slate-400'}`}>Edit Produk</button>
                                <button onClick={() => setActiveTab('merge')} className={`flex-1 py-3 rounded-xl font-bold transition-all ${activeTab==='merge'?'bg-blue-600 text-white shadow-lg':'dark:text-slate-400'}`}>Gabung Foto</button>
                            </div>
                            
                            <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800">
                                {error && <div className="mb-4 p-4 bg-red-50 text-red-600 rounded-2xl text-sm font-bold">⚠️ {error}</div>}
                                
                                <div onClick={() => fileInputRef.current.click()} className="border-4 border-dotted border-blue-500/30 p-10 text-center rounded-3xl cursor-pointer mb-6 hover:bg-blue-50 dark:hover:bg-slate-800/50 transition-all">
                                    <input type="file" ref={fileInputRef} className="hidden" onChange={handleFileUpload} multiple={activeTab==='merge'} />
                                    <div className="text-4xl mb-2">📁</div>
                                    <p className="font-bold dark:text-white">Ketuk untuk Unggah Foto</p>
                                </div>

                                <div className="grid grid-cols-4 gap-2 mb-6">
                                    {images.map(img => (
                                        <div key={img.id} className="relative aspect-square">
                                            <img src={img.data} className="w-full h-full object-cover rounded-xl border-2 border-blue-500" />
                                            <button onClick={()=>setImages(images.filter(i=>i.id!==img.id))} className="absolute -top-2 -right-2 bg-red-500 text-white text-xs p-1 rounded-full">❌</button>
                                        </div>
                                    ))}
                                </div>

                                <textarea className="w-full p-4 rounded-2xl border dark:bg-slate-950 dark:text-white dark:border-slate-800 h-28 outline-none focus:ring-2 ring-blue-500" placeholder="Instruksi AI..." value={prompt} onChange={(e)=>setPrompt(e.target.value)} />
                                <button onClick={handleGenerate} disabled={isGenerating} className="w-full mt-4 bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-700 disabled:opacity-50">
                                    {isGenerating ? "🌀 SEDANG MENYIHIR..." : "SULAP FOTO SEKARANG"}
                                </button>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-xl flex flex-col items-center justify-center min-h-[400px] border border-slate-200 dark:border-slate-800 text-center">
                            {resultImage ? (
                                <div className="w-full">
                                    <img src={resultImage} className="rounded-2xl max-h-[500px] mx-auto shadow-2xl mb-4" />
                                    <button onClick={()=>{const a=document.createElement('a'); a.href=resultImage; a.download='hasil-ai.jpg'; a.click();}} className="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                                        📥 SIMPAN HASIL
                                    </button>
                                </div>
                            ) : (
                                <div className="text-slate-400">
                                    {isGenerating ? (
                                        <div className="loading-animation">
                                            <div className="text-6xl mb-4">🪄</div>
                                            <p className="font-bold text-blue-500">AI sedang memproses...</p>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="text-6xl mb-4 opacity-20">🖼️</div>
                                            <p className="font-bold">Hasil akan muncul di sini</p>
                                        </>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
