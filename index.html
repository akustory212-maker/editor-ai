<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor AI SMM</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl text-center max-w-md w-full">
                        <h1 className="text-3xl font-bold bg-gradient-to-r from-purple-400 to-pink-600 bg-clip-text text-transparent mb-4">
                            Website AI Online!
                        </h1>
                        <p className="text-zinc-400 mb-6">
                            Jika Anda melihat pesan ini, berarti website Anda sudah berhasil berjalan di Vercel.
                        </p>
                        <button 
                            onClick={() => alert('Fitur AI siap dihubungkan!')}
                            className="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-full transition-all">
                            Coba Klik Saya
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
