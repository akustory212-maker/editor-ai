<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Website</title>
    <style>
        /* Anda bisa menaruh kode CSS (desain) di sini */
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
    </style>
</head>
<body>

    <h1>Website AI Saya</h1>
    <div id="app">
        </div>

    <script>
        // --- import React, { useState, useRef, useEffect } from 'react';
import { Upload, Image as ImageIcon, Wand2, Trash2, Download, Sun, Moon, Layers, Sparkles, AlertCircle, Loader2, Type, AlignLeft } from 'lucide-react';

const App = () => {
  // --- State Management ---
  const [darkMode, setDarkMode] = useState(false);
  const [activeTab, setActiveTab] = useState('product'); // 'product' | 'merge'
  const [images, setImages] = useState([]); // Array of { id, data: base64 }
  const [prompt, setPrompt] = useState('');
  const [isGenerating, setIsGenerating] = useState(false);
  const [resultImage, setResultImage] = useState(null);
  const [error, setError] = useState('');
  const fileInputRef = useRef(null);

  // LLM Features State
  const [isEnhancingPrompt, setIsEnhancingPrompt] = useState(false);
  const [isGeneratingCopy, setIsGeneratingCopy] = useState(false);
  const [marketingCopy, setMarketingCopy] = useState('');

  // --- Theme Toggle ---
  useEffect(() => {
    if (darkMode) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  }, [darkMode]);

  // --- Handlers ---
  const handleTabChange = (tab) => {
    setActiveTab(tab);
    setImages([]); // Reset images when changing modes
    setPrompt('');
    setResultImage(null);
    setError('');
    setMarketingCopy('');
  };

  const processFile = (file) => {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          // Batasi ukuran maksimal agar payload tidak terlalu besar (mencegah error server 401/413)
          const MAX_WIDTH = 512;
          const MAX_HEIGHT = 512;
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > MAX_WIDTH) {
              height *= MAX_WIDTH / width;
              width = MAX_WIDTH;
            }
          } else {
            if (height > MAX_HEIGHT) {
              width *= MAX_HEIGHT / height;
              height = MAX_HEIGHT;
            }
          }
          
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          // Kompresi otomatis ke JPEG kualitas 80% untuk meringankan beban API
          resolve(canvas.toDataURL('image/jpeg', 0.8));
        };
        img.onerror = () => reject(new Error("Gagal memuat gambar"));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error("Gagal membaca file"));
      reader.readAsDataURL(file);
    });
  };

  const handleFileUpload = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;

    try {
      setError('');
      let newImages = [];
      
      for (const file of files) {
        if (!file.type.startsWith('image/')) {
          setError('Hanya file gambar yang diperbolehkan.');
          continue;
        }
        const base64Data = await processFile(file);
        newImages.push({ id: Date.now() + Math.random(), data: base64Data });
      }

      if (activeTab === 'product') {
        // Mode Produk: Hanya 1 gambar, timpa yang lama
        setImages([newImages[0]]);
      } else {
        // Mode Merge: Maksimal 4 gambar
        setImages((prev) => {
          const combined = [...prev, ...newImages];
          if (combined.length > 4) {
            setError('Maksimal 4 foto untuk mode penggabungan.');
            return combined.slice(0, 4);
          }
          return combined;
        });
      }
    } catch (err) {
      setError('Gagal memproses gambar.');
    } finally {
      // Reset input value to allow uploading the same file again
      if (fileInputRef.current) fileInputRef.current.value = '';
    }
  };

  const removeImage = (idToRemove) => {
    setImages(images.filter(img => img.id !== idToRemove));
  };

  const handleAutoPrompt = () => {
    if (activeTab === 'product') {
      setPrompt('Transformasikan gambar ini menjadi foto produk yang sangat profesional. Gunakan pencahayaan studio yang dramatis, latar belakang minimalis yang elegan, resolusi 4k, sangat detail, tajam, dan siap untuk katalog e-commerce premium.');
    } else {
      setPrompt('Gabungkan foto-foto ini secara mulus menjadi satu karya seni digital yang kohesif dan kreatif. Sesuaikan pencahayaan dan warna agar terlihat natural, berikan sentuhan sinematik, kualitas mahakarya, detail tinggi.');
    }
  };

  const handleEnhancePrompt = async () => {
    if (!prompt.trim()) {
      return setError('Ketik ide prompt dasar terlebih dahulu untuk diperbagus.');
    }
    setIsEnhancingPrompt(true);
    setError('');
    try {
      const apiKey = "";
      // Menggunakan model teks standar Gemini untuk mengolah prompt
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      
      const payload = {
        contents: [{
          parts: [{ text: `Tolong perbagus prompt singkat berikut agar menjadi prompt instruksi gambar yang sangat detail, fotorealistik, sinematik, dan berstandar profesional untuk AI Image Generator. Jangan tambahkan basa-basi, cukup kembalikan teks promptnya saja dalam bahasa Indonesia: "${prompt}"` }]
        }]
      };

      let data = null;
      const delays = [1000, 2000, 4000];
      for (let attempt = 0; attempt <= 3; attempt++) {
        try {
          const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error('API Error');
          data = await res.json();
          break;
        } catch (err) {
          if (attempt < 3) await new Promise(r => setTimeout(r, delays[attempt]));
        }
      }

      const enhancedText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (enhancedText) setPrompt(enhancedText.replace(/['"]/g, '').trim());
    } catch (err) {
      setError('Gagal memperbagus prompt dengan AI.');
    } finally {
      setIsEnhancingPrompt(false);
    }
  };

  const handleGenerateCopy = async () => {
    if (!resultImage) return;
    setIsGeneratingCopy(true);
    setError('');
    try {
      const apiKey = "";
      // Menggunakan model visi-teks Gemini untuk melihat hasil gambar dan menulis copywriting
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      
      const [prefix, base64Data] = resultImage.split(',');
      
      const textInstruction = activeTab === 'product' 
        ? "Bertindaklah sebagai Copywriter Marketing profesional. Lihat gambar produk ini dan buatkan 2 pilihan caption media sosial (Instagram/TikTok) yang sangat menarik untuk mempromosikannya. Sertakan hashtag yang relevan, emoji yang pas, dan jelaskan nilai jual visualnya."
        : "Bertindaklah sebagai kurator seni digital. Lihat gambar karya seni ini dan buatkan deskripsi singkat yang puitis dan memukau, cocok untuk diposting di media sosial, beserta hashtag yang relevan.";

      const payload = {
        contents: [{
          parts: [
            { text: textInstruction },
            { inlineData: { mimeType: prefix.match(/:(.*?);/)[1], data: base64Data } }
          ]
        }]
      };

      let data = null;
      const delays = [1000, 2000, 4000];
      for (let attempt = 0; attempt <= 3; attempt++) {
        try {
          const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
          if (!res.ok) throw new Error('API Error');
          data = await res.json();
          break;
        } catch (err) {
          if (attempt < 3) await new Promise(r => setTimeout(r, delays[attempt]));
        }
      }

      const copyText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (copyText) setMarketingCopy(copyText);
    } catch (err) {
      setError('Gagal membuat copywriting.');
    } finally {
      setIsGeneratingCopy(false);
    }
  };

  const handleGenerate = async () => {
    // Validasi
    if (images.length === 0) {
      return setError('Silakan unggah setidaknya satu gambar.');
    }
    if (activeTab === 'merge' && images.length < 2) {
      return setError('Mode gabung membutuhkan minimal 2 gambar (maksimal 4).');
    }
    if (!prompt.trim()) {
      return setError('Instruksi/Prompt tidak boleh kosong.');
    }

    setIsGenerating(true);
    setError('');
    setResultImage(null);

    try {
      // API Key akan otomatis disuntikkan di environment ini
      const apiKey = ""; 
      
      // Menggunakan model Nano Banana (gemini-2.5-flash-image-preview) untuk Image-to-Image / Editing
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`;

      // Format payload diperbarui tanpa "role" dan disederhanakan sesuai standar API gambar
      const payload = {
        contents: [{
          role: "user",
          parts: [
            { text: prompt },
            ...images.map(img => {
              const [prefix, base64Data] = img.data.split(',');
              return {
                inlineData: {
                  mimeType: prefix.match(/:(.*?);/)[1], // Akan selalu image/jpeg sekarang
                  data: base64Data
                }
              };
            })
          ]
        }],
        generationConfig: {
          responseModalities: ["TEXT", "IMAGE"]
        }
      };

      let data = null;
      let lastError = null;
      const delays = [1000, 2000, 4000, 8000, 16000];

      // Implementasi Exponential Backoff (Maksimal 5 retry)
      for (let attempt = 0; attempt <= 5; attempt++) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (response.status === 401) {
             throw new Error('HTTP 401: Akses ditolak oleh server. Karena batas sistem pratinjau, pastikan gambar tidak terlalu kompleks. Coba muat ulang halaman (refresh) jika ini terus terjadi.');
          }

          if (!response.ok) {
            const text = await response.text();
            throw new Error(`HTTP Error ${response.status}: ${text}`);
          }

          data = await response.json();
          break; // Keluar dari loop jika sukses
        } catch (err) {
          lastError = err;
          // Jangan retry jika error 401 karena masalah autentikasi tidak selesai dengan retry
          if (err.message.includes('401')) {
            break;
          }
          if (attempt < 5) {
            await new Promise(resolve => setTimeout(resolve, delays[attempt]));
          }
        }
      }

      if (!data) {
        throw new Error(lastError?.message || 'Server AI tidak merespons setelah beberapa percobaan.');
      }

      // Mengekstrak gambar base64 dari response
      const outputBase64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

      if (outputBase64) {
        setResultImage(`data:image/jpeg;base64,${outputBase64}`);
      } else {
        throw new Error('AI gagal menghasilkan gambar. Silakan coba prompt yang berbeda.');
      }
    } catch (err) {
      setError(err.message || 'Gagal memproses gambar. Pastikan kuota API atau koneksi internet stabil.');
    } finally {
      setIsGenerating(false);
    }
  };

  const downloadImage = () => {
    if (!resultImage) return;
    const a = document.createElement('a');
    a.href = resultImage;
    a.download = `AI_Edited_${Date.now()}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  // --- UI Components ---
  return (
    <div className={`min-h-screen transition-colors duration-500 ${darkMode ? 'dark' : ''}`}>
      <div className="min-h-screen bg-gradient-to-br from-blue-50 via-blue-100 to-cyan-50 dark:from-slate-900 dark:via-blue-950 dark:to-slate-900 text-slate-800 dark:text-slate-100 p-4 md:p-8 font-sans">
        
        {/* Navbar */}
        <header className="max-w-6xl mx-auto flex items-center justify-between mb-8 bg-white/50 dark:bg-slate-800/50 backdrop-blur-md p-4 rounded-2xl shadow-sm border border-white/20 dark:border-slate-700/50">
          <div className="flex items-center gap-3">
            <div className="bg-blue-600 p-2 rounded-xl">
              <Sparkles className="w-6 h-6 text-white" />
            </div>
            <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-cyan-500 dark:from-blue-400 dark:to-cyan-300">
              AI Photo Studio
            </h1>
          </div>
          <button 
            onClick={() => setDarkMode(!darkMode)}
            className="p-2 rounded-full hover:bg-white/50 dark:hover:bg-slate-700/50 transition-colors"
            title="Toggle Dark Mode"
          >
            {darkMode ? <Sun className="w-6 h-6 text-yellow-400" /> : <Moon className="w-6 h-6 text-slate-600" />}
          </button>
        </header>

        <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
          
          {/* Left Column: Controls & Input */}
          <div className="lg:col-span-5 space-y-6">
            
            {/* Tabs */}
            <div className="flex p-1 bg-white/60 dark:bg-slate-800/60 backdrop-blur-sm rounded-xl border border-white/20 dark:border-slate-700/50">
              <button
                onClick={() => handleTabChange('product')}
                className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-medium transition-all ${
                  activeTab === 'product' 
                    ? 'bg-blue-600 text-white shadow-md' 
                    : 'text-slate-600 dark:text-slate-300 hover:bg-white/40 dark:hover:bg-slate-700/40'
                }`}
              >
                <ImageIcon className="w-4 h-4" />
                Foto Produk
              </button>
              <button
                onClick={() => handleTabChange('merge')}
                className={`flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg font-medium transition-all ${
                  activeTab === 'merge' 
                    ? 'bg-blue-600 text-white shadow-md' 
                    : 'text-slate-600 dark:text-slate-300 hover:bg-white/40 dark:hover:bg-slate-700/40'
                }`}
              >
                <Layers className="w-4 h-4" />
                Gabung Foto
              </button>
            </div>

            {/* Main Control Card */}
            <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl p-6 rounded-2xl shadow-xl border border-white/40 dark:border-slate-700/50">
              
              {/* Header Info */}
              <div className="mb-6">
                <h2 className="text-xl font-semibold mb-2 flex items-center gap-2">
                  {activeTab === 'product' ? 'Ubah Jadi Foto Produk' : 'Gabung Beberapa Foto'}
                </h2>
                <p className="text-sm text-slate-500 dark:text-slate-400">
                  {activeTab === 'product' 
                    ? 'Unggah 1 foto biasa dan AI akan mengubahnya menjadi foto produk profesional.' 
                    : 'Unggah 2 hingga 4 foto untuk digabungkan oleh AI menjadi satu gambar baru yang unik.'}
                </p>
              </div>

              {/* Error Message */}
              {error && (
                <div className="mb-4 p-4 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 rounded-xl flex items-start gap-3 text-sm">
                  <AlertCircle className="w-5 h-5 shrink-0 mt-0.5" />
                  <p>{error}</p>
                </div>
              )}

              {/* Upload Area */}
              <div className="mb-6">
                <input 
                  type="file" 
                  accept="image/*" 
                  multiple={activeTab === 'merge'}
                  className="hidden" 
                  ref={fileInputRef}
                  onChange={handleFileUpload}
                />
                
                {/* Image Previews */}
                {images.length > 0 ? (
                  <div className={`grid gap-3 mb-4 ${activeTab === 'merge' ? 'grid-cols-2' : 'grid-cols-1'}`}>
                    {images.map((img) => (
                      <div key={img.id} className="relative group rounded-xl overflow-hidden border-2 border-slate-200 dark:border-slate-700 aspect-square">
                        <img src={img.data} alt="Upload preview" className="w-full h-full object-cover" />
                        <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                          <button 
                            onClick={() => removeImage(img.id)}
                            className="p-2 bg-red-500 text-white rounded-full hover:bg-red-600 transition-transform hover:scale-110"
                            title="Hapus foto"
                          >
                            <Trash2 className="w-5 h-5" />
                          </button>
                        </div>
                      </div>
                    ))}
                    
                    {/* Add More Button (Merge Mode) */}
                    {activeTab === 'merge' && images.length < 4 && (
                      <button 
                        onClick={() => fileInputRef.current?.click()}
                        className="flex flex-col items-center justify-center aspect-square rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-600 text-slate-400 hover:text-blue-500 hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-slate-700/50 transition-colors"
                      >
                        <Upload className="w-8 h-8 mb-2" />
                        <span className="text-sm font-medium">Tambah Foto</span>
                      </button>
                    )}
                  </div>
                ) : (
                  <div 
                    onClick={() => fileInputRef.current?.click()}
                    className="w-full aspect-video flex flex-col items-center justify-center rounded-2xl border-2 border-dashed border-blue-300 dark:border-blue-700/50 bg-blue-50/50 dark:bg-slate-800/50 hover:bg-blue-100/50 dark:hover:bg-slate-700/50 cursor-pointer transition-all mb-4 group"
                  >
                    <div className="bg-white dark:bg-slate-700 p-4 rounded-full shadow-sm mb-3 group-hover:scale-110 transition-transform">
                      <Upload className="w-8 h-8 text-blue-500" />
                    </div>
                    <p className="font-medium text-slate-700 dark:text-slate-300">Klik untuk mengunggah foto</p>
                    <p className="text-sm text-slate-500 dark:text-slate-400 mt-1">
                      {activeTab === 'product' ? 'Maksimal 1 gambar' : '2 hingga 4 gambar'}
                    </p>
                  </div>
                )}
                
                {/* Quick replace button for product mode */}
                {images.length > 0 && activeTab === 'product' && (
                  <button 
                    onClick={() => fileInputRef.current?.click()}
                    className="text-sm text-blue-600 dark:text-blue-400 font-medium hover:underline flex items-center gap-1"
                  >
                    <ImageIcon className="w-4 h-4" /> Ganti Foto
                  </button>
                )}
              </div>

              {/* Prompt Input */}
              <div className="space-y-3">
                <div className="flex items-center justify-between">
                  <label className="block text-sm font-medium text-slate-700 dark:text-slate-300">
                    Instruksi AI (Prompt)
                  </label>
                  <div className="flex gap-2">
                    <button 
                      onClick={handleEnhancePrompt}
                      disabled={isEnhancingPrompt}
                      className="text-xs font-semibold text-purple-600 dark:text-purple-400 hover:text-purple-700 dark:hover:text-purple-300 flex items-center gap-1 bg-purple-50 dark:bg-purple-900/30 px-2 py-1 rounded-md transition-colors disabled:opacity-50"
                    >
                      {isEnhancingPrompt ? <Loader2 className="w-3 h-3 animate-spin" /> : <Sparkles className="w-3 h-3" />}
                      ✨ Perbagus
                    </button>
                    <button 
                      onClick={handleAutoPrompt}
                      className="text-xs font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 flex items-center gap-1 bg-blue-50 dark:bg-blue-900/30 px-2 py-1 rounded-md transition-colors"
                    >
                      <Wand2 className="w-3 h-3" /> Auto
                    </button>
                  </div>
                </div>
                <textarea
                  value={prompt}
                  onChange={(e) => setPrompt(e.target.value)}
                  placeholder={activeTab === 'product' ? "Contoh: Ubah sepatu ini berlatar belakang studio neon..." : "Contoh: Gabungkan kucing ini menjadi astronot di bulan..."}
                  className="w-full h-32 px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none transition-shadow"
                />
              </div>

              {/* Generate Button */}
              <button
                onClick={handleGenerate}
                disabled={isGenerating || images.length === 0}
                className={`w-full mt-6 py-4 rounded-xl font-bold text-white flex items-center justify-center gap-2 transition-all shadow-lg shadow-blue-500/30 ${
                  isGenerating || images.length === 0
                    ? 'bg-slate-400 dark:bg-slate-700 cursor-not-allowed shadow-none'
                    : 'bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 hover:scale-[1.02]'
                }`}
              >
                {isGenerating ? (
                  <>
                    <Loader2 className="w-6 h-6 animate-spin" />
                    Sedang Memproses...
                  </>
                ) : (
                  <>
                    <Sparkles className="w-6 h-6" />
                    Generate Foto
                  </>
                )}
              </button>
            </div>
          </div>

          {/* Right Column: Result Area */}
          <div className="lg:col-span-7">
            <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl p-6 rounded-2xl shadow-xl border border-white/40 dark:border-slate-700/50 h-full min-h-[500px] flex flex-col relative overflow-hidden">
              
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-xl font-semibold flex items-center gap-2">
                  Hasil Editan
                </h2>
                {resultImage && (
                  <button
                    onClick={downloadImage}
                    className="flex items-center gap-2 px-4 py-2 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-medium rounded-lg hover:bg-slate-800 dark:hover:bg-slate-100 transition-colors"
                  >
                    <Download className="w-4 h-4" /> Unduh
                  </button>
                )}
              </div>

              <div className="flex-1 bg-slate-100 dark:bg-slate-900/50 rounded-xl border border-slate-200 dark:border-slate-700 flex items-center justify-center overflow-hidden relative">
                {isGenerating ? (
                  <div className="flex flex-col items-center justify-center text-blue-600 dark:text-blue-400">
                    <div className="relative w-24 h-24 mb-4">
                      <div className="absolute inset-0 border-4 border-blue-200 dark:border-blue-900/50 rounded-full"></div>
                      <div className="absolute inset-0 border-4 border-blue-600 dark:border-blue-400 rounded-full border-t-transparent animate-spin"></div>
                      <Wand2 className="absolute inset-0 m-auto w-8 h-8 animate-pulse text-blue-600 dark:text-blue-400" />
                    </div>
                    <p className="font-medium animate-pulse">Menyihir foto Anda dengan AI...</p>
                  </div>
                ) : resultImage ? (
                  <img 
                    src={resultImage} 
                    alt="AI Generated Result" 
                    className="max-w-full max-h-[600px] object-contain w-full h-full p-2"
                  />
                ) : (
                  <div className="text-center text-slate-400 dark:text-slate-500 p-8">
                    <ImageIcon className="w-16 h-16 mx-auto mb-4 opacity-50" />
                    <p className="font-medium text-lg">Belum ada foto yang dihasilkan.</p>
                    <p className="text-sm mt-2">Unggah foto dan tekan Generate untuk melihat hasilnya di sini.</p>
                  </div>
                )}
              </div>

              {/* LLM Marketing Copywriter Feature */}
              {resultImage && !isGenerating && (
                <div className="mt-6 pt-6 border-t border-slate-200 dark:border-slate-700 animate-in fade-in slide-in-from-bottom-4 duration-500">
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="text-lg font-semibold flex items-center gap-2">
                      <Type className="w-5 h-5 text-blue-500" />
                      Asisten Copywriter AI
                    </h3>
                    <button
                      onClick={handleGenerateCopy}
                      disabled={isGeneratingCopy}
                      className="text-sm px-4 py-2 bg-gradient-to-r from-purple-600 to-pink-500 hover:from-purple-700 hover:to-pink-600 text-white font-medium rounded-lg flex items-center gap-2 transition-all disabled:opacity-70 shadow-md shadow-purple-500/20"
                    >
                      {isGeneratingCopy ? (
                        <Loader2 className="w-4 h-4 animate-spin" />
                      ) : (
                        <Sparkles className="w-4 h-4" />
                      )}
                      ✨ Buat Copywriting
                    </button>
                  </div>

                  {marketingCopy && (
                    <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700">
                      <div className="flex items-center gap-2 mb-3 text-slate-500 dark:text-slate-400 border-b border-slate-200 dark:border-slate-700 pb-2">
                        <AlignLeft className="w-4 h-4" />
                        <span className="text-xs font-semibold uppercase tracking-wider">Hasil Generate</span>
                      </div>
                      <div className="prose prose-sm dark:prose-invert max-w-none text-slate-700 dark:text-slate-300 whitespace-pre-wrap leading-relaxed">
                        {marketingCopy}
                      </div>
                    </div>
                  )}
                </div>
              )}

            </div>
          </div>

        </main>
      </div>
    </div>
  );
};

export default App; ---
